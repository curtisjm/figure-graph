# World of Floorcraft — development environment
#
# Quick reference (run from project root):
#
#   docker compose build dev                                   # one-time, ~3-5 min
#   docker compose run --service-ports --rm dev                # interactive bash shell
#   docker compose run --service-ports --rm dev pnpm dev       # run dev server in foreground
#   docker compose run --rm dev pnpm test                      # run integration tests
#
# Inside the interactive shell, the typical first-time flow is:
#
#   pnpm install         # populates the node_modules anonymous volume
#   pnpm dev             # starts Next.js on :3000 (mapped to host)
#
# Subsequent shells reuse the node_modules / .next / .pg-test volumes,
# so `pnpm install` only re-runs when package.json changes.

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: floorcraft-dev
    container_name: floorcraft-dev

    volumes:
      # Bind-mount the project — edits in either direction propagate live
      - .:/workspace
      # Anonymous volumes for directories that should NOT round-trip to host:
      # they're container-local and persist across runs of this service.
      - /workspace/node_modules
      - /workspace/.next
      - /workspace/.pg-test

    ports:
      - "3000:3000"   # Next.js dev server
      - "5433:5433"   # test-suite PostgreSQL (only used during `pnpm test`)

    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1

    # Keep STDIN open + allocate a TTY so an interactive shell works as
    # the default command. `docker compose run` overrides command at the CLI
    # for one-shot use (e.g. `... dev pnpm dev`).
    stdin_open: true
    tty: true
    command: bash
